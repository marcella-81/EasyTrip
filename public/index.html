<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EasyTrip</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f14;
      --surface: #16181f;
      --surface2: #1e2029;
      --border: rgba(255,255,255,0.07);
      --accent: #4f8ef7;
      --accent2: #7dd3fc;
      --text: #f0f2f8;
      --muted: #7c8194;
      --success: #34d399;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }

    /* HEADER */
    header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .logo-wrap {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #4f8ef7 0%, #7dd3fc 100%);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .logo-text {
      font-family: 'DM Sans', serif;
      font-size: 28px;
      background: linear-gradient(90deg, #4f8ef7, #7dd3fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* SEARCH */
    .search-wrap {
      width: 100%;
      max-width: 560px;
      margin-bottom: 2.5rem;
    }
    .search-box {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .search-box:focus-within {
      border-color: rgba(79,142,247,0.5);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.1);
    }
    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 16px 20px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }
    .search-box input::placeholder { color: var(--muted); }
    .search-box button {
      background: linear-gradient(135deg, #4f8ef7, #7dd3fc);
      border: none;
      padding: 0 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #0e0f14;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.02em;
    }
    .search-box button:hover { opacity: 0.9; }
    .search-box button:active { opacity: 0.8; }

    /* CARD */
    .result-card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      display: none;
      animation: fadeUp 0.4s ease;
    }
    .result-card.visible { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      padding: 1.75rem 1.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .flag-circle {
      width: 52px; height: 52px;
      background: var(--surface2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .card-title { font-family: 'Playfair Display', serif; font-size: 22px; }
    .card-continent {
      font-size: 12px;
      color: var(--accent2);
      margin-top: 2px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .card-body { padding: 1.5rem 1.75rem; }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.25rem;
    }
    .info-item {
      background: var(--surface2);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .info-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .info-value {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }
    .info-item.full { grid-column: span 2; }

    /* câmbio destaque */
    .cambio-item {
      background: linear-gradient(135deg, rgba(79,142,247,0.15), rgba(125,211,252,0.08));
      border: 1px solid rgba(79,142,247,0.25);
      border-radius: 12px;
      padding: 16px 18px;
      grid-column: span 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cambio-label-col .info-label { margin-bottom: 5px; }
    .cambio-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent2);
    }
    .cambio-icon {
      font-size: 28px;
      opacity: 0.7;
    }

    /* clima */
    .clima-row {
      background: var(--surface2);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 0;
    }
    .clima-icon { font-size: 24px; }
    .clima-text { font-size: 14px; color: var(--muted); }
    .clima-text strong { color: var(--text); font-weight: 500; }

    /* loading / error */
    .state-msg {
      width: 100%;
      max-width: 560px;
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 14px;
      display: none;
    }
    .state-msg.visible { display: block; }
    .state-msg.error { color: #f87171; }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .timestamp {
      text-align: right;
      font-size: 11px;
      color: var(--muted);
      margin-top: 1rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-wrap">
      <div class="logo-icon">✈</div>
      <span class="logo-text">EasyTrip</span>
    </div>
    <p class="tagline">Explore o mundo com um clique</p>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="input" placeholder="Digite o país em inglês (ex: France)" />
      <button onclick="buscar()">Buscar</button>
    </div>
  </div>

  <div class="state-msg" id="loading">
    <div class="spinner"></div>
    Buscando informações...
  </div>

  <div class="state-msg error" id="error"></div>

  <div class="result-card" id="card">
    <div class="card-header">
      <div class="flag-circle" id="flag">📍</div>
      <div>
        <div class="card-title" id="nome"></div>
        <div class="card-continent" id="continente"></div>
      </div>
    </div>
    <div class="card-body">
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">Capital</div>
          <div class="info-value" id="capital"></div>
        </div>
        <div class="info-item">
          <div class="info-label">Idioma</div>
          <div class="info-value" id="idioma"></div>
        </div>
        <div class="info-item">
          <div class="info-label">Moeda</div>
          <div class="info-value" id="moeda"></div>
        </div>
        <div class="info-item">
          <div class="info-label">População</div>
          <div class="info-value" id="populacao"></div>
        </div>
        <div class="cambio-item">
          <div class="cambio-label-col">
            <div class="info-label">Câmbio</div>
            <div class="cambio-value" id="cambio"></div>
          </div>
          <div class="cambio-icon">💱</div>
        </div>
        <div class="clima-row full" id="clima-row">
          <div class="clima-icon">🌤</div>
          <div class="clima-text" id="clima"></div>
        </div>
      </div>
      <div class="timestamp" id="timestamp"></div>
    </div>
  </div>

  <script>
    const input = document.getElementById('input');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') buscar(); });

    const FLAGS = {
      france:'🇫🇷', brazil:'🇧🇷', japan:'🇯🇵', usa:'🇺🇸',
      'united states':'🇺🇸', germany:'🇩🇪', italy:'🇮🇹',
      spain:'🇪🇸', portugal:'🇵🇹', argentina:'🇦🇷',
      canada:'🇨🇦', australia:'🇦🇺', china:'🇨🇳',
      india:'🇮🇳', mexico:'🇲🇽', uk:'🇬🇧',
      'united kingdom':'🇬🇧', netherlands:'🇳🇱',
    };

    function getFlag(dest) {
      return FLAGS[dest.toLowerCase()] || '🌍';
    }

    async function buscar() {
      const dest = input.value.trim();
      if (!dest) return;

      setLoading(true);
      setError('');
      setCard(false);

      try {
        const res = await fetch(`/api/destination/${encodeURIComponent(dest)}`);
        if (!res.ok) throw new Error('Destino não encontrado.');
        const data = await res.json();
        renderCard(data);
      } catch (err) {
        setError(err.message || 'Erro ao buscar destino.');
      } finally {
        setLoading(false);
      }
    }

    function renderCard(data) {
      const p = data.informacoesDoPais;
      document.getElementById('flag').textContent = getFlag(data.destino);
      document.getElementById('nome').textContent = data.destino;
      document.getElementById('continente').textContent = p.continente;
      document.getElementById('capital').textContent = p.capital;
      document.getElementById('idioma').textContent = p.idioma;
      document.getElementById('moeda').textContent = `${p.moeda} · ${p.codigoMoeda}`;
      document.getElementById('populacao').textContent = Number(p.populacao.replace(/\D/g,'')).toLocaleString('pt-BR');

      const cambioEl = document.getElementById('cambio');
      const cambioItem = cambioEl.closest('.cambio-item');
      if (data.cambio.moedaOrigem === 'BRL') {
        cambioItem.style.display = 'none';
      } else {
        cambioItem.style.display = '';
        cambioEl.textContent = data.cambio.cotacaoEmBRL;
      }
      
      const climaEl = document.getElementById('clima');
      if (data.clima) {
        climaEl.innerHTML = `<strong>${p.capital}</strong> · ${data.clima.temperatura} · ${data.clima.descricao}`;
            } else {
        climaEl.innerHTML = '<strong>Clima</strong> · aguardando integração OpenWeather';
      }

      document.getElementById('timestamp').textContent = `Gerado em ${data.geradoEm}`;
      setCard(true);
    }

    function setLoading(v) {
      document.getElementById('loading').classList.toggle('visible', v);
    }
    function setError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.toggle('visible', !!msg);
    }
    function setCard(v) {
      document.getElementById('card').classList.toggle('visible', v);
    }
  </script>
</body>
</html>
