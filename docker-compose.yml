services:
  postgres:
    image: postgres:16-alpine
    container_name: easytrip-postgres
    environment:
      POSTGRES_USER: easytrip
      POSTGRES_PASSWORD: easytrip
      POSTGRES_DB: easytrip
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U easytrip']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    container_name: easytrip-postgres-test
    environment:
      POSTGRES_USER: easytrip
      POSTGRES_PASSWORD: easytrip
      POSTGRES_DB: easytrip_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U easytrip']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
